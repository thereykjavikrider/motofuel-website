<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My MotoFuel Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Oswald:wght@400;600;700&family=Bebas+Neue&family=Rajdhani:wght@600;700&family=Titillium+Web:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Racing+Sans+One&family=Rye&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --brand: #e05c00;
  --brand-dim: #b84d00;
  --brand-glow: rgba(224,92,0,0.15);
  --black: #0a0a0a;
  --dark: #111111;
  --card: #1a1a1a;
  --card2: #222222;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --muted: #888888;
  --green: #22c55e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 900; color: var(--brand); text-decoration: none; }
.nav-sub { color: var(--muted); font-size: 0.8rem; margin-left: 0.5rem; }
.nav-right { display: flex; gap: 1rem; align-items: center; }
.nav-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: 'Barlow', sans-serif; transition: all 0.2s; }
.nav-btn:hover { border-color: var(--brand); color: var(--brand); }
.nav-btn.active { background: var(--brand); border-color: var(--brand); color: white; }

/* IMPORT SCREEN */
#import-screen {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 6rem 2rem 4rem;
  text-align: center;
}

.import-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: 900; margin-bottom: 1rem;
}
.import-title span { color: var(--brand); }
.import-sub { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto 3rem; }

.drop-zone {
  width: 100%; max-width: 500px;
  border: 2px dashed var(--border);
  border-radius: 16px; padding: 4rem 2rem;
  cursor: pointer; transition: all 0.2s;
  background: var(--card);
  position: relative;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--brand);
  background: rgba(224,92,0,0.05);
}
.drop-icon { font-size: 3rem; margin-bottom: 1rem; }
.drop-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.drop-sub { color: var(--muted); font-size: 0.9rem; }
.drop-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 10; }

.how-to {
  margin-top: 3rem; max-width: 500px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem; text-align: left;
}
.how-to h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--brand); }
.how-to ol { padding-left: 1.2rem; color: var(--muted); font-size: 0.9rem; }
.how-to li { margin-bottom: 0.5rem; }
.how-to li strong { color: var(--text); }

/* DASHBOARD */
#dashboard { display: none; }

/* BIKE TABS */
.bike-tabs {
  padding: 1rem 2rem 0;
  display: flex; gap: 0.5rem; overflow-x: auto;
  border-bottom: 1px solid var(--border);
  background: var(--dark);
}
.bike-tab {
  padding: 0.8rem 1.5rem;
  border-radius: 8px 8px 0 0;
  cursor: pointer; font-weight: 600;
  font-size: 0.9rem; white-space: nowrap;
  border: 1px solid transparent;
  border-bottom: none;
  transition: all 0.2s;
  color: var(--muted);
  background: transparent;
  font-family: 'Barlow', sans-serif;
}
.bike-tab.active {
  color: white;
  border-color: var(--border);
  border-bottom-color: transparent;
  margin-bottom: -1px;
}
.bike-tab:hover { color: var(--text); }

/* BIKE HEADER */
.bike-header {
  padding: 2rem;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.bike-header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.08;
  pointer-events: none;
}
.bike-header-content { position: relative; z-index: 1; }
.bike-make { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.3rem; }
.bike-name { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1; margin-bottom: 0.5rem; }
.bike-model { color: var(--muted); font-size: 1rem; margin-bottom: 1.5rem; }

/* STATS ROW */
.stats-row {
  display: flex; gap: 1rem; flex-wrap: wrap;
}
.stat-card {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 1rem 1.5rem;
  min-width: 140px;
}
.stat-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
.stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900; line-height: 1; }

/* CONTENT */
.dashboard-content { padding: 2rem; max-width: 1200px; }

.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem; font-weight: 900;
  margin-bottom: 1rem; letter-spacing: 0.02em;
}

.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.chart-card h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1.5rem; margin-bottom: 1.5rem;
}
@media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

/* FILLUP TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th { text-align: left; padding: 0.6rem 1rem; color: var(--muted); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 0.7rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
tr:hover td { background: rgba(255,255,255,0.02); }
.economy-cell { font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; }

/* RIDING STYLE */
.style-bars { display: flex; flex-direction: column; gap: 0.8rem; }
.style-bar-row { display: flex; align-items: center; gap: 1rem; }
.style-bar-label { width: 80px; font-size: 0.85rem; color: var(--muted); }
.style-bar-track { flex: 1; background: var(--card2); border-radius: 4px; height: 8px; overflow: hidden; }
.style-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.style-bar-pct { width: 40px; text-align: right; font-size: 0.85rem; font-weight: 600; }

/* TIRE SECTION */
.tire-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.tire-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; }
.tire-card h4 { font-weight: 600; margin-bottom: 0.3rem; }
.tire-detail { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.8rem; }
.tire-km { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; }
.tire-status { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 0.3rem; }
.tire-status.active { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.tire-status.retired { background: rgba(136,136,136,0.15); color: var(--muted); border: 1px solid rgba(136,136,136,0.3); }

/* HALL OF FAME */
.hof-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
.hof-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; text-align: center; }
.hof-rank { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.hof-trophy { font-size: 2rem; margin-bottom: 0.5rem; }
.hof-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.3rem; }
.hof-km { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900; }

/* RIDE SECTION */
.ride-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.ride-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; }
.ride-date { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
.ride-stats { display: flex; gap: 1rem; flex-wrap: wrap; }
.ride-stat { text-align: center; }
.ride-stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 900; line-height: 1; }
.ride-stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* EMPTY STATE */
.empty { text-align: center; padding: 3rem; color: var(--muted); }
.empty-icon { font-size: 3rem; margin-bottom: 1rem; }

/* MANUFACTURER THEMES */
.theme-bmw         { --brand: #1C69D4; --brand-glow: rgba(28,105,212,0.15); }
.theme-bmw .bike-header { border-bottom: 4px solid transparent; border-image: linear-gradient(90deg, #6CBAE7 33%, #1C69D4 33%, #1C69D4 66%, #E52222 66%) 1; }
.theme-honda       { --brand: #CC0000; --brand-glow: rgba(204,0,0,0.15); }
.theme-kawasaki    { --brand: #39B54A; --brand-glow: rgba(57,181,74,0.15); }
.theme-yamaha      { --brand: #0A0A8C; --brand-glow: rgba(10,10,140,0.15); }
.theme-ducati      { --brand: #CC0000; --brand-glow: rgba(204,0,0,0.15); }
.theme-ktm         { --brand: #FF6600; --brand-glow: rgba(255,102,0,0.15); }
.theme-triumph     { --brand: #C5A028; --brand-glow: rgba(197,160,40,0.15); }
.theme-harley      { --brand: #FF6600; --brand-glow: rgba(255,102,0,0.15); }
.theme-suzuki      { --brand: #004B93; --brand-glow: rgba(0,75,147,0.15); }
.theme-aprilia     { --brand: #C00000; --brand-glow: rgba(192,0,0,0.15); }
.theme-royalenfield{ --brand: #8B4513; --brand-glow: rgba(139,69,19,0.15); }
.theme-default     { --brand: #e05c00; --brand-glow: rgba(224,92,0,0.15); }

/* UTILS */
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
.badge-ironbutt { background: rgba(224,92,0,0.15); color: var(--brand); border: 1px solid rgba(224,92,0,0.3); }

.no-data { color: var(--muted); font-style: italic; font-size: 0.85rem; }

canvas { max-height: 250px; }

/* APP LAYOUT */
.app-layout {
  display: flex;
  min-height: 100vh;
  padding-top: 0;
}

.sidebar {
  width: 260px;
  min-width: 260px;
  background: #111;
  border-right: 1px solid #2a2a2a;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 50;
  display: flex;
  flex-direction: column;
  padding: 1.5rem 0;
}

.sidebar-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem;
  font-weight: 900;
  color: #e05c00;
  padding: 0 1.5rem;
  margin-bottom: 2rem;
  text-decoration: none;
  display: block;
}

.sidebar-bike {
  margin-bottom: 0.25rem;
}

.sidebar-bike-btn {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 0.6rem 1.5rem;
  cursor: pointer;
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: #888;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  transition: color 0.15s;
}
.sidebar-bike-btn:hover { color: #f0f0f0; }
.sidebar-bike-btn.active { color: var(--bike-color, #e05c00); }

.sidebar-bike-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.sidebar-sections {
  display: none;
  flex-direction: column;
  margin-bottom: 0.5rem;
}
.sidebar-sections.open { display: flex; }

.sidebar-section-btn {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 0.45rem 1.5rem 0.45rem 3rem;
  cursor: pointer;
  font-family: 'Barlow', sans-serif;
  font-size: 0.85rem;
  color: #666;
  transition: color 0.15s;
}
.sidebar-section-btn:hover { color: #f0f0f0; }
.sidebar-section-btn.active {
  color: var(--bike-color, #e05c00);
  font-weight: 600;
}

.sidebar-bottom {
  margin-top: auto;
  padding: 1.5rem;
  border-top: 1px solid #2a2a2a;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.sidebar-action-btn {
  background: none;
  border: 1px solid #2a2a2a;
  color: #666;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: 'Barlow', sans-serif;
  text-align: left;
  transition: all 0.15s;
}
.sidebar-action-btn:hover { border-color: #e05c00; color: #e05c00; }
.sidebar-action-btn.danger:hover { border-color: #ef4444; color: #ef4444; }

.main-panel {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
  padding: 2rem;
}

.section-panel { display: none; }
.section-panel.active { display: block; }

@keyframes section-fade {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .sidebar {
    position: relative;
    width: 100%;
    min-width: unset;
    border-right: none;
    border-bottom: 1px solid #2a2a2a;
    padding: 0.75rem 0 0;
    flex-direction: column;
  }
  .app-layout { flex-direction: column; }
  .main-panel { margin-left: 0; padding: 1rem; }
  .sidebar-logo { display: none; }
  .sidebar-bike-btn { padding: 0.5rem 1rem; }
  .sidebar-sections { flex-direction: row; overflow-x: auto; padding: 0.5rem 1rem; }
  .sidebar-section-btn { padding: 0.4rem 1rem; white-space: nowrap; }
}

/* RIDES SECTION */
.rides-list { display: flex; flex-direction: column; gap: 1rem; }

.ride-card-v2 {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.ride-card-header {
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ride-card-stats {
  padding: 0 1.2rem 1rem;
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.ride-map-container {
  height: 300px;
  display: none;
}
.ride-map-container.open { display: block; }

.show-route-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.3rem 0.8rem;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'Barlow', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.show-route-btn:hover { border-color: var(--brand); color: var(--brand); }

.stat-card-sm {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 1rem;
  min-width: 100px;
}
.stat-card-sm .stat-value { font-size: 1.5rem; }

/* CONSUMABLES SECTION */
.consumables-section { display: flex; flex-direction: column; gap: 2rem; }
.consumables-group { display: flex; flex-direction: column; gap: 1rem; }
.consumables-group-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.consumable-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem;
}
.consumable-card-title {
  font-weight: 700; font-size: 1rem;
  margin-bottom: 0.75rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.consumable-badge {
  font-size: 0.7rem; font-weight: 700;
  padding: 0.15rem 0.5rem; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.badge-active  { background: rgba(34,197,94,0.15);  color: #22c55e; }
.badge-retired { background: rgba(136,136,136,0.15); color: #888; }
.progress-track {
  background: #2a2a2a; border-radius: 4px;
  height: 6px; margin: 0.5rem 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.3s ease;
}
.collapsible-toggle {
  background: none; border: none;
  color: var(--muted); font-size: 0.8rem;
  cursor: pointer; padding: 0.4rem 0;
  font-family: 'Barlow', sans-serif;
}
.collapsible-toggle:hover { color: var(--text); }
.collapsible-content { display: none; }
.collapsible-content.open { display: block; }
.history-row {
  display: flex; gap: 1rem;
  padding: 0.4rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem; color: var(--muted);
}
.history-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div style="display:flex;align-items:center;">
    <a href="/" class="nav-logo">MotoFuel</a>
    <span class="nav-sub">Dashboard</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn" id="reset-btn" style="display:none" onclick="resetDashboard()">⟳ Import new file</button>
    <a href="/dashboard-guide.html" class="nav-btn" style="background:var(--brand);color:white;border-color:var(--brand)">❓ How to use this</a><a href="/" class="nav-btn">motofuel.app</a>
  </div>
</nav>

<!-- IMPORT SCREEN -->
<div id="import-screen">
  <h1 class="import-title">My <span>MotoFuel</span><br>Dashboard</h1>
  <p class="import-sub">See your full riding history, charts and statistics on the big screen.</p>

  <input type="file" id="file-input" accept=".json" style="display:none">

  <div style="display:flex;gap:1.5rem;width:100%;max-width:700px;flex-wrap:wrap;justify-content:center;">

    <!-- Import card -->
    <div class="drop-zone" id="drop-zone" style="flex:1;min-width:280px;max-width:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;">
      <div class="drop-icon">📂</div>
      <div class="drop-title">Import your data</div>
      <div class="drop-sub" style="margin-bottom:1.5rem">Drop a JSON file or browse</div>
      <button onclick="document.getElementById('file-input').click()" style="background:var(--brand);color:white;border:none;padding:0.8rem 2rem;border-radius:6px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;width:100%;">📂 Browse Files</button>
    </div>

    <!-- Guide card -->
    <a href="/dashboard-guide.html" style="flex:1;min-width:280px;max-width:340px;min-height:280px;background:rgba(224,92,0,0.08);border:2px solid rgba(224,92,0,0.3);border-radius:16px;padding:2rem;text-decoration:none;color:var(--text);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color 0.2s;" onmouseover="this.style.borderColor='#e05c00'" onmouseout="this.style.borderColor='rgba(224,92,0,0.3)'">
      <div style="font-size:3rem;margin-bottom:1rem">❓</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;color:var(--brand);letter-spacing:0.05em;margin-bottom:0.5rem">HOW DOES THIS WORK?</div>
      <div style="color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;line-height:1.5">Step by step guide<br>Takes 30 seconds to read</div>
      <div style="background:var(--brand);color:white;padding:0.8rem 2rem;border-radius:6px;font-weight:700;font-size:1rem;width:100%">📖 Read the guide</div>
    </a>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-panel" id="main-panel"></main>
  </div>
</div>

<script>
// ── MANUFACTURER THEMES ──────────────────────────────────────────
const THEMES = {
  bmw:         { class: 'theme-bmw',         color: '#1C69D4', emoji: '🔵', bg: 'linear-gradient(135deg, #000d1a, #003057)', stripe: true,  font: 'Oswald, sans-serif',          label: 'BMW Motorrad' },
  honda:       { class: 'theme-honda',       color: '#CC0000', emoji: '🔴', bg: 'linear-gradient(135deg, #1a0000, #3d0000)', font: '"Racing Sans One", sans-serif',  label: 'Honda' },
  kawasaki:    { class: 'theme-kawasaki',    color: '#39B54A', emoji: '🟢', bg: 'linear-gradient(135deg, #001a0a, #003015)', font: '"Bebas Neue", sans-serif',        label: 'Kawasaki' },
  yamaha:      { class: 'theme-yamaha',      color: '#0A0A8C', emoji: '🔵', bg: 'linear-gradient(135deg, #000010, #00003a)', font: '"Titillium Web", sans-serif',     label: 'Yamaha' },
  ducati:      { class: 'theme-ducati',      color: '#CC0000', emoji: '🔴', bg: 'linear-gradient(135deg, #0a0000, #1a0000)', font: '"Playfair Display", serif',       label: 'Ducati' },
  ktm:         { class: 'theme-ktm',         color: '#FF6600', emoji: '🟠', bg: 'linear-gradient(135deg, #0d0500, #1a0a00)', font: '"Bebas Neue", sans-serif',        label: 'KTM' },
  triumph:     { class: 'theme-triumph',     color: '#C5A028', emoji: '🟡', bg: 'linear-gradient(135deg, #0d0d00, #1a1500)', font: '"Playfair Display", serif',       label: 'Triumph' },
  'harley-davidson': { class: 'theme-harley', color: '#FF6600', emoji: '🟠', bg: 'linear-gradient(135deg, #0d0500, #1a0800)', font: 'Rye, serif',                    label: 'Harley-Davidson' },
  harley:      { class: 'theme-harley',      color: '#FF6600', emoji: '🟠', bg: 'linear-gradient(135deg, #0d0500, #1a0800)', font: 'Rye, serif',                    label: 'Harley-Davidson' },
  suzuki:      { class: 'theme-suzuki',      color: '#004B93', emoji: '🔵', bg: 'linear-gradient(135deg, #000a18, #001428)', font: '"Rajdhani", sans-serif',          label: 'Suzuki' },
  aprilia:     { class: 'theme-aprilia',     color: '#C00000', emoji: '🔴', bg: 'linear-gradient(135deg, #0d0000, #200000)', font: '"Barlow Condensed", sans-serif',  label: 'Aprilia' },
  'royal enfield': { class: 'theme-royalenfield', color: '#8B4513', emoji: '🟤', bg: 'linear-gradient(135deg, #0d0500, #1a0a00)', font: '"Playfair Display", serif', label: 'Royal Enfield' },
};

function getTheme(make) {
  if (!make) return { class: 'theme-default', color: '#e05c00', emoji: '🏍️', bg: 'linear-gradient(135deg, #1a0a00, #2d1500)' };
  const key = make.toLowerCase().trim();
  for (const [k, v] of Object.entries(THEMES)) {
    if (key.includes(k)) return v;
  }
  return { class: 'theme-default', color: '#e05c00', emoji: '🏍️', bg: 'linear-gradient(135deg, #1a0a00, #2d1500)' };
}

// ── DATA ─────────────────────────────────────────────────────────
let allData = null;
let currentBikeIdx = 0;
let currentSection = 'fuel';
let chartInstances = {};
let leafletMaps = {};
let rideLocationsCache = {};

// ── FILE IMPORT ───────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      allData = normaliseData(data);
      showDashboard();
    } catch(err) {
      alert('Could not read this file. Please export JSON from the MotoFuel app and try again.');
    }
  };
  reader.readAsText(file);
}

// ── OPTION C: URL HASH IMPORT ─────────────────────────────────────
function checkUrlHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return false;
  try {
    // Try base64 decode first
    let json;
    try {
      json = atob(hash);
    } catch(e) {
      json = decodeURIComponent(hash);
    }
    const data = JSON.parse(json);
    allData = normaliseData(data);
    showDashboard();
    return true;
  } catch(err) {
    console.error('Could not parse URL hash data:', err);
    return false;
  }
}

// Check on load — URL hash takes priority, then localStorage
window.addEventListener('load', () => {
  if (!checkUrlHash()) {
    try {
      const saved = localStorage.getItem('mf_dashboard_data');
      if (saved) {
        allData = normaliseData(JSON.parse(saved));
        showDashboard();
      }
    } catch(e) {}
  }
});

function normaliseData(raw) {
  let bikes = [];

  const normaliseRide = r => {
    let duration_minutes = r.duration_minutes;
    if (!duration_minutes && r.start_time && r.end_time) {
      duration_minutes = Math.round((new Date(r.end_time) - new Date(r.start_time)) / 60000);
    }
    return {
      ...r,
      duration_minutes,
      ride_locations:  r.ride_locations || r.locations || [],
      avg_speed_kmh:   r.avg_speed_kmh  ?? null,
      start_odometer:  r.start_odometer ?? null,
      end_odometer:    r.end_odometer   ?? null,
    };
  };

  const consumables = (src) => ({
    chains:           src.chains           || [],
    cush_drives:      src.cush_drives      || [],
    sprockets_front:  src.sprockets_front  || [],
    sprockets_rear:   src.sprockets_rear   || [],
    brake_pads_front: src.brake_pads_front || [],
    brake_pads_rear:  src.brake_pads_rear  || [],
  });

  // All bikes export: {bikes: [{bike:{}, fillups:[], rides:[], wheel_sets:[], chains:[], ...}, ...]}
  // Also handles already-normalised localStorage format where each element is a flat bike object.
  if (raw.bikes && Array.isArray(raw.bikes)) {
    bikes = raw.bikes.map(b => {
      if (b.bike) {
        // Raw export: consumables sit alongside bike/fillups/rides at the element level
        return { ...b.bike, fillups: b.fillups || [], rides: (b.rides || []).map(normaliseRide), wheel_sets: b.wheel_sets || [], ...consumables(b) };
      }
      // Already-normalised (from localStorage): flat bike object — preserve everything and guarantee consumable arrays
      return { ...b, rides: (b.rides || []).map(normaliseRide), ...consumables(b) };
    });
  }
  // Single bike export: {bike:{}, fillups:[], rides:[], wheel_sets:[], chains:[], ...}
  // Consumables sit at the top level of the export, NOT inside the bike object.
  else if (raw.bike) {
    bikes = [{ ...raw.bike, fillups: raw.fillups || [], rides: (raw.rides || []).map(normaliseRide), wheel_sets: raw.wheel_sets || [], ...consumables(raw) }];
  }
  else if (Array.isArray(raw)) { bikes = raw; }
  else if (raw.make || raw.model || raw.fillups) { bikes = [raw]; }

  // Calculate economy and distance from odometer readings
  bikes = bikes.map(bike => {
    const fillups = (bike.fillups || []).map((f, i, arr) => {
      const prev = arr.slice(0, i).reverse().find(p => !p.partial && !p.baseline);
      let economy = null;
      let distance_km = null;
      if (prev && !f.partial && !f.baseline && f.odometer && prev.odometer) {
        distance_km = f.odometer - prev.odometer;
        if (distance_km > 0 && f.litres > 0) {
          economy = (f.litres / distance_km) * 100;
        }
      }
      return { ...f, economy, distance_km };
    });
    return { ...bike, fillups };
  });

  return { bikes };
}

function resetDashboard() {
  allData = null;
  localStorage.removeItem('mf_dashboard_data');
  document.getElementById('import-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.querySelector('nav').style.display = '';
  fileInput.value = '';
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  Object.values(leafletMaps).forEach(m => { try { m.remove(); } catch(e) {} });
  leafletMaps = {};
  rideLocationsCache = {};
}

// ── SHOW DASHBOARD ────────────────────────────────────────────────
function showDashboard() {
  try { localStorage.setItem('mf_dashboard_data', JSON.stringify(allData)); } catch(e) {}
  document.getElementById('import-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.querySelector('nav').style.display = 'none';
  currentBikeIdx = 0;
  currentSection = 'fuel';
  renderSidebar();
  renderMainPanel(0, 'fuel');
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const sectionDefs = [
    { key: 'fuel',        label: 'Fuel' },
    { key: 'rides',       label: 'Rides' },
    { key: 'consumables', label: 'Consumables' },
    { key: 'tires',       label: 'Tires' },
  ];

  let html = `<a href="/" class="sidebar-logo">MotoFuel</a>`;

  allData.bikes.forEach((bike, i) => {
    const theme = getTheme(bike.make);
    const isActive = i === currentBikeIdx;
    const name = bike.name || bike.make || 'Bike ' + (i + 1);

    html += `<div class="sidebar-bike">
      <button class="sidebar-bike-btn${isActive ? ' active' : ''}"
        style="--bike-color:${theme.color}"
        onclick="selectBike(${i})">
        <span class="sidebar-bike-dot" style="background:${theme.color}"></span>
        ${name}
      </button>`;

    if (isActive) {
      html += `<div class="sidebar-sections open" style="--bike-color:${theme.color}">`;
      sectionDefs.forEach(({ key, label }) => {
        html += `<button class="sidebar-section-btn${currentSection === key ? ' active' : ''}"
          style="--bike-color:${theme.color}"
          onclick="selectSection('${key}')">
          ${label}
        </button>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  html += `<div class="sidebar-bottom">
    <button class="sidebar-action-btn" onclick="resetDashboard()">Import new file</button>
    <button class="sidebar-action-btn danger" onclick="forgetData()">Forget my data</button>
  </div>`;

  sidebar.innerHTML = html;
}

function selectBike(i) {
  currentBikeIdx = i;
  currentSection = 'fuel';
  renderSidebar();
  renderMainPanel(i, 'fuel');
}

function selectSection(section) {
  currentSection = section;
  renderSidebar();
  renderMainPanel(currentBikeIdx, section);
}

function renderBike(idx) {
  const bike = allData.bikes[idx];
  if (!bike) return;
  const theme = getTheme(bike.make);
  const fillups = bike.fillups || [];
  const tires = bike.wheel_sets || bike.tires || [];
  const rides = bike.rides || [];

  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  const content = document.getElementById('bike-content');
  content.className = theme.class;
  content.innerHTML = renderBikeHeader(bike, theme, fillups, rides) +
    '<div class="dashboard-content">' +
    renderEconomyChart(fillups, theme) +
    renderCostChart(fillups, theme) +
    renderRidingStyle(fillups, theme) +
    renderFillupTable(fillups, theme) +
    renderRides(rides, theme) +
    renderTires(tires, theme) +
    '</div>';

  // Init charts after DOM
  setTimeout(() => {
    initEconomyChart(fillups, theme);
    initCostChart(fillups, theme);
  }, 50);
}

function renderMainPanel(bikeIdx, section) {
  const bike = allData.bikes[bikeIdx];
  if (!bike) return;
  const theme = getTheme(bike.make);
  const fillups = bike.fillups || [];
  const tires = bike.wheel_sets || bike.tires || [];
  const rides = bike.rides || [];

  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  Object.values(leafletMaps).forEach(m => { try { m.remove(); } catch(e) {} });
  leafletMaps = {};
  rideLocationsCache = {};

  const panel = document.getElementById('main-panel');
  panel.className = 'main-panel ' + theme.class;

  let html = '';
  if (section === 'fuel') {
    html = renderBikeHeader(bike, theme, fillups, rides) +
      '<div class="dashboard-content">' +
      renderFuelSummary(fillups, theme, bike.currency || 'kr') +
      renderEconomyChart(fillups, theme) +
      renderCostChart(fillups, theme) +
      renderRidingStyle(fillups, theme) +
      renderFillupTable(fillups, theme) +
      '</div>';
  } else if (section === 'rides') {
    html = renderBikeHeader(bike, theme, fillups, rides) +
      '<div class="dashboard-content">' +
      renderRides(rides, theme) +
      '</div>';
  } else if (section === 'consumables') {
    html = renderBikeHeader(bike, theme, fillups, rides) +
      '<div class="dashboard-content">' +
      renderConsumables(bike, theme) +
      '</div>';
  } else if (section === 'tires') {
    html = renderBikeHeader(bike, theme, fillups, rides) +
      '<div class="dashboard-content">' +
      renderTires(tires, theme) +
      '</div>';
  }

  panel.innerHTML = html;
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = 'section-fade 0.2s ease';

  if (section === 'fuel') {
    setTimeout(() => {
      initEconomyChart(fillups, theme);
      initCostChart(fillups, theme);
    }, 50);
  }
}

function renderBikeHeader(bike, theme, fillups, rides) {
  const validFillups = fillups.filter(f => f.economy != null && f.economy > 0 && !f.baseline);
  const avgEconomy = validFillups.length ? (validFillups.reduce((s,f) => s + f.economy, 0) / validFillups.length).toFixed(1) : '—';
  const totalKm = fillups.length ? Math.max(...fillups.map(f => f.odometer || 0)) - Math.min(...fillups.map(f => f.odometer || 0)) : 0;
  const totalCost = fillups.reduce((s,f) => s + (f.total_cost || 0), 0);
  const totalLitres = fillups.reduce((s,f) => s + (f.litres || 0), 0);
  const currency = bike.currency || 'kr';
  const costPerKm = totalKm > 0 ? (totalCost / totalKm).toFixed(2) : null;

  const mStripe = theme.stripe ? `<div style="display:flex;height:4px;margin-bottom:1.5rem;border-radius:2px;overflow:hidden;width:120px"><div style="flex:1;background:#6CBAE7"></div><div style="flex:1;background:#1C69D4"></div><div style="flex:1;background:#E52222"></div></div>` : '';
  return `
  <div class="bike-header" style="background: ${theme.bg};">
    <div class="bike-header::before" style="background:${theme.color}"></div>
    <div class="bike-header-content">
      <div class="bike-make" style="color:${theme.color};font-family:${theme.font||'inherit'}">${theme.label || bike.make || 'Unknown'}</div>
      <div class="bike-name" style="font-family:${theme.font||'Barlow Condensed, sans-serif'}">${bike.name || bike.model || 'My Bike'}</div>
      <div class="bike-model">${bike.model || ''} · ${bike.year || ''}</div>
      ${mStripe}
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Avg Economy</div>
          <div class="stat-value" style="color:${theme.color}">${avgEconomy} L/100km</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Tracked</div>
          <div class="stat-value">${totalKm.toLocaleString()} km</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Fill-ups</div>
          <div class="stat-value">${fillups.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value">${totalCost.toLocaleString()} ${currency}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Litres</div>
          <div class="stat-value">${Math.round(totalLitres).toLocaleString()} L</div>
        </div>
        ${costPerKm !== null ? `<div class="stat-card"><div class="stat-label">Avg Cost/km</div><div class="stat-value">${costPerKm} ${currency}</div></div>` : ''}
        ${rides.length ? `<div class="stat-card"><div class="stat-label">Rides</div><div class="stat-value">${rides.length}</div></div>` : ''}
      </div>
    </div>
  </div>`;
}

function renderFuelSummary(fillups, theme, currency) {
  const dated = fillups.filter(f => f.date).sort((a,b) => a.date.localeCompare(b.date));
  if (!dated.length) return '';

  const firstStr = dated[0].date.substring(0, 10);
  const lastStr  = dated[dated.length - 1].date.substring(0, 10);
  const [fy, fm] = firstStr.split('-').map(Number);
  const [ly, lm] = lastStr.split('-').map(Number);
  const totalMonths = (ly - fy) * 12 + (lm - fm);
  const years  = Math.floor(totalMonths / 12);
  const months = totalMonths % 12;
  const spanStr = totalMonths <= 0 ? '< 1 month' :
    years > 0
      ? `${years} year${years > 1 ? 's' : ''}${months > 0 ? ` ${months} month${months > 1 ? 's' : ''}` : ''}`
      : `${months} month${months !== 1 ? 's' : ''}`;

  const fmtDate = s => {
    const [y, mo, d] = s.split('-');
    const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${+d} ${names[+mo - 1]} ${y}`;
  };

  const valid = fillups.filter(f => f.economy > 0 && !f.baseline);
  let bestHtml = '', worstHtml = '';
  if (valid.length) {
    const best  = valid.reduce((a,b) => a.economy < b.economy ? a : b);
    const worst = valid.reduce((a,b) => a.economy > b.economy ? a : b);
    bestHtml  = `<div style="flex:1;min-width:150px">
      <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem">Best Fill-up</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:${theme.color};line-height:1">${best.economy.toFixed(1)} <span style="font-size:0.85rem">L/100km</span></div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">${best.date ? best.date.substring(0,10) : ''}</div>
    </div>`;
    worstHtml = `<div style="flex:1;min-width:150px">
      <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem">Worst Fill-up</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:var(--muted);line-height:1">${worst.economy.toFixed(1)} <span style="font-size:0.85rem">L/100km</span></div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">${worst.date ? worst.date.substring(0,10) : ''}</div>
    </div>`;
  }

  const totalCost = fillups.reduce((s,f) => s + (f.total_cost || 0), 0);

  return `
  <div class="chart-card">
    <h3>📊 Tracking Summary</h3>
    <div style="display:flex;gap:2rem;flex-wrap:wrap;align-items:flex-start">
      <div style="flex:1;min-width:150px">
        <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem">Period</div>
        <div style="font-size:0.9rem;font-weight:600">${fmtDate(firstStr)} – ${fmtDate(lastStr)}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">${spanStr}</div>
      </div>
      ${bestHtml}
      ${worstHtml}
      ${totalCost > 0 ? `<div style="flex:1;min-width:150px">
        <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem">Total Fuel Cost</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;line-height:1">${totalCost.toLocaleString()} ${currency}</div>
      </div>` : ''}
    </div>
  </div>`;
}

function renderEconomyChart(fillups, theme) {
  return `<div class="chart-card"><h3>⛽ Fuel Economy — L/100km</h3><canvas id="economy-chart"></canvas></div>`;
}

function renderCostChart(fillups, theme) {
  return `<div class="charts-grid">
    <div class="chart-card"><h3>💰 Cost per Fill-up</h3><canvas id="cost-chart"></canvas></div>
    <div class="chart-card"><h3>🛣️ Distance per Fill-up</h3><canvas id="dist-chart"></canvas></div>
  </div>`;
}

function initEconomyChart(fillups, theme) {
  const valid = fillups.filter(f => f.economy > 0 && !f.baseline).slice(-30);
  if (!valid.length) return;
  const ctx = document.getElementById('economy-chart');
  if (!ctx) return;
  const avg = valid.reduce((s,f) => s + f.economy, 0) / valid.length;
  chartInstances['economy'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: valid.map(f => f.date ? f.date.substring(0,10) : ''),
      datasets: [
        {
          label: 'L/100km',
          data: valid.map(f => f.economy),
          borderColor: theme.color,
          backgroundColor: theme.color + '20',
          tension: 0.4,
          fill: true,
          pointRadius: 4,
          pointBackgroundColor: theme.color,
          order: 1,
        },
        {
          label: `Avg ${avg.toFixed(1)}`,
          data: valid.map(() => avg),
          borderColor: theme.color + '80',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 2,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: {
          display: true,
          labels: { color: '#666', font: { size: 11 }, boxWidth: 24, usePointStyle: false }
        }
      },
      scales: {
        x: { ticks: { color: '#666', maxTicksLimit: 8, font: { size: 11 } }, grid: { color: '#1a1a1a' } },
        y: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1a1a1a' } }
      }
    },
    plugins: [{
      id: 'avgLabel',
      afterDraw(chart) {
        const { ctx: c, chartArea, scales } = chart;
        const yPos = scales.y.getPixelForValue(avg);
        c.save();
        c.font = '600 10px Barlow, sans-serif';
        c.fillStyle = theme.color + '99';
        c.textAlign = 'right';
        c.textBaseline = 'bottom';
        c.fillText('Avg', chartArea.right, yPos - 2);
        c.restore();
      }
    }]
  });

  // Also render dist chart
  const ctxD = document.getElementById('dist-chart');
  if (ctxD) {
    chartInstances['dist'] = new Chart(ctxD, {
      type: 'bar',
      data: {
        labels: valid.map(f => f.date ? f.date.substring(0,10) : ''),
        datasets: [{
          label: 'km',
          data: valid.map(f => f.distance_km || 0),
          backgroundColor: theme.color + '60',
          borderColor: theme.color,
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#666', maxTicksLimit: 8, font: { size: 11 } }, grid: { color: '#1a1a1a' } },
          y: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1a1a1a' } }
        }
      }
    });
  }
}

function initCostChart(fillups, theme) {
  const valid = fillups.filter(f => f.total_cost > 0).slice(-30);
  if (!valid.length) return;
  const ctx = document.getElementById('cost-chart');
  if (!ctx) return;
  chartInstances['cost'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: valid.map(f => f.date ? f.date.substring(0,10) : ''),
      datasets: [{
        label: 'Cost',
        data: valid.map(f => f.total_cost),
        backgroundColor: theme.color + '80',
        borderColor: theme.color,
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#666', maxTicksLimit: 8, font: { size: 11 } }, grid: { color: '#1a1a1a' } },
        y: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1a1a1a' } }
      }

function renderRidingStyle(fillups, theme) {
  const totals = { road: 0, off: 0, town: 0, track: 0, mixed: 0, count: 0 };
  fillups.forEach(f => {
    const sum = (f.on_road_pct || 0) + (f.off_road_pct || 0) + (f.in_town_pct || 0) +
                (f.track_day_pct || 0) + (f.mixed_pct || 0);
    if (sum > 0) {
      totals.road  += f.on_road_pct   || 0;
      totals.off   += f.off_road_pct  || 0;
      totals.town  += f.in_town_pct   || 0;
      totals.track += f.track_day_pct || 0;
      totals.mixed += f.mixed_pct     || 0;
      totals.count++;
    }
  });
  if (!totals.count) return '';
  const road  = Math.round(totals.road  / totals.count);
  const off   = Math.round(totals.off   / totals.count);
  const town  = Math.round(totals.town  / totals.count);
  const track = Math.round(totals.track / totals.count);
  const mixed = Math.round(totals.mixed / totals.count);

  const bar = (label, pct, color) => pct > 0 ? `
    <div class="style-bar-row">
      <span class="style-bar-label">${label}</span>
      <div class="style-bar-track"><div class="style-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="style-bar-pct" style="color:${color}">${pct}%</span>
    </div>` : '';

  return `
  <div class="chart-card">
    <h3>🛣️ Riding Style Average</h3>
    <div class="style-bars">
      ${bar('On Road',  road,  theme.color)}
      ${bar('Off Road', off,   '#8b5cf6')}
      ${bar('In Town',  town,  '#06b6d4')}
      ${bar('Track Day',track, '#f59e0b')}
      ${bar('Mixed',    mixed, '#6b7280')}
    </div>
  </div>`;
}

function renderFillupTable(fillups, theme) {
  if (!fillups.length) return '';
  const sorted = [...fillups].reverse().slice(0, 50);
  const rows = sorted.map(f => {
    const isBaseline = f.baseline === 1 || f.baseline === true;
    const isPartial  = f.partial  === 1 || f.partial  === true;

    const economy = f.economy > 0 && !isBaseline
      ? `<span class="economy-cell" style="color:${theme.color}">${f.economy.toFixed(1)} L/100km</span>`
      : isBaseline ? `<span class="no-data">Baseline</span>` : '—';

    const partialBadge = isPartial
      ? ` <span style="display:inline-block;padding:0.1rem 0.35rem;border-radius:3px;font-size:0.65rem;font-weight:700;letter-spacing:0.05em;background:rgba(136,136,136,0.15);color:var(--muted);border:1px solid rgba(136,136,136,0.3);vertical-align:middle">P</span>`
      : '';
    const litresCell = f.litres ? `${f.litres.toFixed(2)} L${partialBadge}` : '—';

    const station = f.station_name
      ? (f.station_name.length > 20 ? f.station_name.substring(0, 20) + '…' : f.station_name)
      : `<span style="color:var(--muted)">—</span>`;

    const pctParts = [];
    if ((f.on_road_pct   || 0) > 0) pctParts.push(`Rd ${f.on_road_pct}%`);
    if ((f.off_road_pct  || 0) > 0) pctParts.push(`Off ${f.off_road_pct}%`);
    if ((f.in_town_pct   || 0) > 0) pctParts.push(`Town ${f.in_town_pct}%`);
    if ((f.track_day_pct || 0) > 0) pctParts.push(`Track ${f.track_day_pct}%`);
    if ((f.mixed_pct     || 0) > 0) pctParts.push(`Mixed ${f.mixed_pct}%`);
    const styleCell = pctParts.length
      ? `<span style="color:var(--muted);font-size:0.78rem">${pctParts.join(' · ')}</span>`
      : '';

    const rowStyle = isBaseline ? ' style="background:rgba(224,92,0,0.05)"' : '';

    return `<tr${rowStyle}>
      <td>${f.date ? f.date.substring(0,10) : '—'}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${station}</td>
      <td>${f.odometer ? f.odometer.toLocaleString() + ' km' : '—'}</td>
      <td>${litresCell}</td>
      <td>${f.total_cost ? f.total_cost.toLocaleString() : '—'}</td>
      <td>${economy}</td>
      <td>${styleCell}</td>
    </tr>`;
  }).join('');
  return `
  <div class="chart-card">
    <h3>📋 Fill-up History (last 50)</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Date</th><th>Station</th><th>Odometer</th><th>Litres</th><th>Cost</th><th>Economy</th><th>Style</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderRides(rides, theme) {
  rideLocationsCache = {};
  if (!rides.length) {
    return '<div class="empty"><div class="empty-icon">🏍️</div><p>No rides recorded yet</p></div>';
  }

  const fmtDate = dt => {
    if (!dt) return '—';
    return new Date(dt).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
  };

  const totalDist = rides.reduce((s,r) => s + (r.distance_km || 0), 0);
  const totalMins = rides.reduce((s,r) => s + (r.duration_minutes || 0), 0);
  const longest   = rides.reduce((a,b) => (a.distance_km||0) >= (b.distance_km||0) ? a : b);
  const withSpeed = rides.filter(r => r.max_speed_kmh);
  const topSpeed  = withSpeed.length ? Math.max(...withSpeed.map(r => r.max_speed_kmh)) : null;

  const statsHtml = `<div class="chart-card" style="margin-bottom:1.5rem">
    <div class="stats-row">
      <div class="stat-card stat-card-sm">
        <div class="stat-label">Total Rides</div>
        <div class="stat-value">${rides.length}</div>
      </div>
      <div class="stat-card stat-card-sm">
        <div class="stat-label">Total Distance</div>
        <div class="stat-value">${Math.round(totalDist).toLocaleString()} km</div>
      </div>
      <div class="stat-card stat-card-sm">
        <div class="stat-label">Total Time</div>
        <div class="stat-value">${formatDuration(totalMins)}</div>
      </div>
      <div class="stat-card stat-card-sm">
        <div class="stat-label">Longest Ride</div>
        <div class="stat-value" style="color:${theme.color}">${Math.round(longest.distance_km||0).toLocaleString()} km</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:0.15rem">${fmtDate(longest.start_time)}</div>
      </div>
      ${topSpeed ? `<div class="stat-card stat-card-sm"><div class="stat-label">Top Speed</div><div class="stat-value">${Math.round(topSpeed)} km/h</div></div>` : ''}
    </div>
  </div>`;

  const sorted = [...rides].reverse();
  const cards = sorted.map((r, i) => {
    rideLocationsCache[i] = r.ride_locations || [];
    const date     = fmtDate(r.start_time);
    const ironButt = r.is_iron_butt ? '<span class="badge badge-ironbutt" style="margin-left:0.5rem">🏁 Iron Butt</span>' : '';
    const dur      = r.duration_minutes ? formatDuration(r.duration_minutes) : null;
    const dist     = r.distance_km ? Math.round(r.distance_km).toLocaleString() + ' km' : null;
    const avgSpd   = r.avg_speed_kmh ? Math.round(r.avg_speed_kmh) + ' km/h' : null;
    const maxSpd   = r.max_speed_kmh ? Math.round(r.max_speed_kmh) + ' km/h' : null;

    const stat = (val, lbl, hi) => val ? `
      <div class="ride-stat">
        <div class="ride-stat-val"${hi ? ` style="color:${theme.color}"` : ''}>${val}</div>
        <div class="ride-stat-lbl">${lbl}</div>
      </div>` : '';

    const odoLine = (r.start_odometer || r.end_odometer)
      ? `<div style="padding:0 1.2rem 0.75rem;font-size:0.75rem;color:var(--muted)">
           ${r.start_odometer ? r.start_odometer.toLocaleString() + ' km' : '?'} → ${r.end_odometer ? r.end_odometer.toLocaleString() + ' km' : '?'}
         </div>`
      : '';

    return `<div class="ride-card-v2">
      <div class="ride-card-header">
        <div><span style="font-weight:600;font-size:0.95rem">${date}</span>${ironButt}</div>
        <button class="show-route-btn" id="ride-btn-${i}" onclick="toggleRideMap(${i},'${theme.color}')">Show Route</button>
      </div>
      <div class="ride-card-stats">
        ${stat(dist,   'Distance', true)}
        ${stat(dur,    'Duration', false)}
        ${stat(avgSpd, 'Avg Speed', false)}
        ${stat(maxSpd, 'Max Speed', false)}
        ${stat(r.fillup_count ? String(r.fillup_count) : null, 'Fill-ups', false)}
      </div>
      ${odoLine}
      <div class="ride-map-container" id="ride-map-${i}"></div>
    </div>`;
  }).join('');

  return `<div class="rides-list">${statsHtml}${cards}</div>`;
}

function toggleRideMap(rideId, themeColor) {
  const container = document.getElementById('ride-map-' + rideId);
  const btn       = document.getElementById('ride-btn-' + rideId);
  if (!container) return;

  if (container.classList.contains('open')) {
    container.classList.remove('open');
    if (btn) btn.textContent = 'Show Route';
    if (leafletMaps[rideId]) {
      leafletMaps[rideId].remove();
      delete leafletMaps[rideId];
    }
    return;
  }

  container.classList.add('open');
  const locations = rideLocationsCache[rideId] || [];

  if (!locations.length) {
    container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.9rem">No GPS data for this ride</div>';
    if (btn) btn.textContent = 'Hide';
    return;
  }

  if (btn) btn.textContent = 'Hide Route';

  const map = L.map(container, { zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
  }).addTo(map);

  const latlngs = locations.map(loc => [loc.lat, loc.lon]);
  const line = L.polyline(latlngs, { color: themeColor, weight: 3, opacity: 0.9 }).addTo(map);

  L.circleMarker(latlngs[0], {
    radius: 7, fillColor: '#22c55e', color: '#ffffff', weight: 2, fillOpacity: 1
  }).addTo(map);

  L.circleMarker(latlngs[latlngs.length - 1], {
    radius: 7, fillColor: themeColor, color: '#ffffff', weight: 2, fillOpacity: 1
  }).addTo(map);

  map.fitBounds(line.getBounds(), { padding: [20, 20] });
  leafletMaps[rideId] = map;
}

function renderTires(wheelSets, theme) {
  if (!wheelSets || !wheelSets.length) return '';

  // Flatten all tires from all wheel sets
  let allTires = [];
  wheelSets.forEach(ws => {
    (ws.tires || []).forEach(t => {
      allTires.push({ ...t, wheel_set: ws.name || '' });
    });
  });
  if (!allTires.length) return '';

  const hof = allTires.filter(t => t.retired).sort((a,b) => (b.km_ridden||0) - (a.km_ridden||0));

  let html = `<div style="margin-bottom:1.5rem"><div class="section-title" style="color:${theme.color}">🛞 Tire Tracker</div>`;

  // Active tires grouped by wheel set
  wheelSets.forEach(ws => {
    const activeTires = (ws.tires || []).filter(t => !t.retired);
    if (!activeTires.length) return;
    const isMounted = ws.mounted === true;
    const statusLabel = isMounted ? 'Mounted' : 'In Garage';
    const statusColor = isMounted ? 'var(--green)' : 'var(--muted)';
    const statusBg = isMounted ? 'rgba(34,197,94,0.15)' : 'rgba(136,136,136,0.1)';
    const statusBorder = isMounted ? 'rgba(34,197,94,0.3)' : 'rgba(136,136,136,0.2)';
    html += `<div style="margin-bottom:0.5rem;display:flex;align-items:center;gap:0.8rem;">
      <span style="color:var(--muted);font-size:0.8rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase">${ws.name}</span>
      <span style="background:${statusBg};border:1px solid ${statusBorder};color:${statusColor};font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.15rem 0.5rem;border-radius:3px">${statusLabel}</span>
    </div>
    <div class="tire-grid" style="margin-bottom:1.5rem">` +
    activeTires.map(t => `<div class="tire-card" style="${isMounted ? '' : 'opacity:0.7'}">
      <h4>${t.brand || ''} ${t.model || ''}</h4>
      <div class="tire-detail">${t.position || ''} · ${t.size || ''}</div>
      <div class="tire-km" style="color:${theme.color}">${(t.km_ridden||0).toLocaleString()} km</div>
      ${t.mounted_at ? `<div style="color:var(--muted);font-size:0.75rem;margin-top:0.3rem">Since ${t.mounted_at}</div>` : ''}
    </div>`).join('') + '</div>';
  });

  // Hall of Fame
  if (hof.length) {
    const trophies = ['🏆','🥈','🥉','🏅','🏅','🏅'];
    html += `<div style="margin-bottom:1rem;color:var(--muted);font-size:0.8rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase">🏆 Hall of Fame</div>
    <div class="hof-grid">` +
    hof.slice(0,6).map((t, i) => `<div class="hof-card" ${i===0?`style="border-color:${theme.color}40"`:''}>
      <div class="hof-rank" ${i===0?`style="color:${theme.color}"`:''}>${i===0?'👑 Champion':'#'+(i+1)}</div>
      <div class="hof-trophy">${trophies[i]||'🏅'}</div>
      <div class="hof-name">${t.brand||''} ${t.model||''}</div>
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.3rem">${t.position||''} · ${t.wheel_set}</div>
      <div class="hof-km" style="color:${theme.color}">${(t.km_ridden||0).toLocaleString()} km</div>
      <div style="color:var(--muted);font-size:0.7rem;margin-top:0.3rem">${t.mounted_at||''} → ${t.retired_at||''}</div>
    </div>`).join('') + '</div>';
  }

  return html + '</div>';
}

function formatDuration(minutes) {
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function forgetData() {
  if (confirm('This will clear all your data from this browser. Are you sure?')) {
    resetDashboard();
  }
}

function toggleCollapsible(contentId, btnId) {
  const el  = document.getElementById(contentId);
  const btn = document.getElementById(btnId);
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  if (btn) btn.textContent = btn.textContent.replace(isOpen ? '▼' : '▲', isOpen ? '▲' : '▼');
}

function renderConsumables(bike, theme) {
  const chains     = bike.chains           || [];
  const cushDrives = bike.cush_drives      || [];
  const sprFront   = bike.sprockets_front  || [];
  const sprRear    = bike.sprockets_rear   || [];
  const padsFront  = bike.brake_pads_front || [];
  const padsRear   = bike.brake_pads_rear  || [];

  const hasAny = chains.length || cushDrives.length || sprFront.length ||
                 sprRear.length || padsFront.length  || padsRear.length;
  if (!hasAny) {
    return `<div class="empty"><div class="empty-icon">🔧</div>
      <p>No consumables data for this bike. Add consumables in the MotoFuel app to see them here.</p></div>`;
  }

  const fillups    = bike.fillups || [];
  const currentOdo = fillups.length ? Math.max(...fillups.map(f => f.odometer || 0)) : null;

  const fmtDate = s => {
    if (!s) return '—';
    const parts = (s + '').substring(0, 10).split('-');
    if (parts.length < 3) return s;
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${+parts[2]} ${mon[+parts[1] - 1]} ${parts[0]}`;
  };

  const bar = pct => {
    const w   = Math.min(100, Math.max(0, pct));
    const clr = pct >= 85 ? '#ef4444' : pct >= 65 ? '#f59e0b' : 'var(--brand)';
    return `<div class="progress-track"><div class="progress-fill" style="width:${w}%;background:${clr}"></div></div>
      <div style="font-size:0.75rem;color:${clr};font-weight:700;margin-bottom:0.5rem">${pct}% used</div>`;
  };

  const kmBlock = (kmAtInstall, kmLimit, kmRidden) => {
    const cells = [];
    if (kmAtInstall != null) cells.push(`<div><div class="stat-label">Installed at</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700">${kmAtInstall.toLocaleString()} km</div></div>`);
    if (kmRidden != null) cells.push(`<div><div class="stat-label">Km ridden</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:var(--brand)">${kmRidden.toLocaleString()} km</div></div>`);
    if (kmLimit)  cells.push(`<div><div class="stat-label">Km limit</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700">${kmLimit.toLocaleString()} km</div></div>`);
    let html = `<div style="display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:0.75rem">${cells.join('')}</div>`;
    if (kmRidden != null && kmLimit) html += bar(Math.round((kmRidden / kmLimit) * 100));
    return html;
  };

  const isActive = c => c.retired !== 1 && c.retired !== true;

  const historyRows = (items, labelFn) => items.map((c, i) => {
    const nextKm = items[i + 1]?.km_at_install ?? null;
    const ridden = c.km_at_install != null && nextKm != null
      ? Math.max(0, nextKm - c.km_at_install) : null;
    return `<div class="history-row">
      ${labelFn(c)}
      <span>from ${fmtDate(c.installed_at)}</span>
      ${ridden !== null ? `<span>${ridden.toLocaleString()} km</span>` : ''}
      ${c.km_limit ? `<span style="color:var(--muted)">/ ${c.km_limit.toLocaleString()} km limit</span>` : ''}
    </div>`;
  }).join('');

  function renderChainCard() {
    if (!chains.length) return '';
    const active  = chains.find(isActive);
    const retired = chains.filter(c => !isActive(c)).sort((a, b) => (a.km_at_install || 0) - (b.km_at_install || 0));
    let html = '';

    if (active) {
      const kmRidden = currentOdo != null && active.km_at_install != null
        ? Math.max(0, currentOdo - active.km_at_install) : null;
      html += `<div class="consumable-card">
        <div class="consumable-card-title">⛓️ ${active.brand || 'Drive Chain'}
          <span class="consumable-badge badge-active">Active</span>
        </div>
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem">Installed ${fmtDate(active.installed_at)}</div>
        ${kmBlock(active.km_at_install, active.km_limit, kmRidden)}
        ${active.notes ? `<div style="font-size:0.8rem;color:var(--muted);font-style:italic;margin-top:0.25rem">${active.notes}</div>` : ''}
      </div>`;

      const allLube = chains.flatMap(c => c.lube_events || [])
        .filter(e => e.odometer_km != null)
        .sort((a, b) => b.odometer_km - a.odometer_km);
      if (allLube.length) {
        const last    = allLube[0];
        const kmSince = currentOdo != null ? Math.max(0, currentOdo - last.odometer_km) : null;
        html += `<div class="consumable-card">
          <div class="consumable-card-title">🛢️ Chain Lube
            <span class="consumable-badge" style="background:rgba(136,136,136,0.15);color:#888">${allLube.length} events</span>
          </div>
          <div style="display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:0.75rem">
            <div>
              <div class="stat-label">Last lubed</div>
              <div style="font-size:0.9rem;font-weight:600">${fmtDate(last.date)}</div>
              <div style="font-size:0.75rem;color:var(--muted)">${last.odometer_km.toLocaleString()} km</div>
            </div>
            ${kmSince !== null ? `<div>
              <div class="stat-label">Since last lube</div>
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:var(--brand)">${kmSince.toLocaleString()} km</div>
            </div>` : ''}
          </div>
          <button class="collapsible-toggle" id="lube-hist-btn"
            onclick="toggleCollapsible('lube-hist','lube-hist-btn')">▼ Show lube history</button>
          <div class="collapsible-content" id="lube-hist" style="margin-top:0.5rem">
            ${allLube.slice(0, 10).map(e => `<div class="history-row">
              <span style="min-width:90px">${fmtDate(e.date)}</span>
              <span>${e.odometer_km.toLocaleString()} km</span>
              ${e.product ? `<span style="margin-left:auto;color:var(--text)">${e.product}</span>` : ''}
            </div>`).join('')}
          </div>
        </div>`;
      }
    }

    if (retired.length) {
      const withActive = [...retired, ...(active ? [active] : [])];
      html += `<div class="consumable-card">
        <button class="collapsible-toggle" id="chain-hist-btn"
          onclick="toggleCollapsible('chain-hist','chain-hist-btn')">▼ Chain History (${retired.length} retired)</button>
        <div class="collapsible-content" id="chain-hist" style="margin-top:0.5rem">
          ${historyRows(retired, c => `<span style="font-weight:600;color:var(--text)">${c.brand || '—'}</span>`)}
        </div>
      </div>`;
    }
    return html;
  }

  function renderSprocketCard(sprockets, position) {
    if (!sprockets.length) return '';
    const active  = sprockets.find(isActive);
    const retired = sprockets.filter(s => !isActive(s)).sort((a, b) => (a.km_at_install || 0) - (b.km_at_install || 0));
    const label   = position === 'front' ? '⚙️ Front Sprocket' : '⚙️ Rear Sprocket';
    const idPfx   = 'spr-' + position;
    let html = '<div class="consumable-card">';

    if (active) {
      const kmRidden = currentOdo != null && active.km_at_install != null
        ? Math.max(0, currentOdo - active.km_at_install) : null;
      html += `<div class="consumable-card-title">${label}${active.teeth ? ' — ' + active.teeth + 'T' : ''}
        <span class="consumable-badge badge-active">Active</span>
      </div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem">${active.brand ? active.brand + ' · ' : ''}Installed ${fmtDate(active.installed_at)}</div>
      ${kmBlock(active.km_at_install, active.km_limit, kmRidden)}`;
    } else {
      html += `<div class="consumable-card-title">${label}</div>`;
    }

    if (retired.length) {
      html += `<button class="collapsible-toggle" id="${idPfx}-hist-btn"
        onclick="toggleCollapsible('${idPfx}-hist','${idPfx}-hist-btn')">▼ ${retired.length} retired</button>
      <div class="collapsible-content" id="${idPfx}-hist" style="margin-top:0.5rem">
        ${historyRows(retired, s => `<span style="font-weight:600;color:var(--text)">${s.brand || '—'}${s.teeth ? ' ' + s.teeth + 'T' : ''}</span>`)}
      </div>`;
    }
    return html + '</div>';
  }

  function renderCushDriveCard() {
    if (!cushDrives.length) return '';
    const active  = cushDrives.find(isActive);
    const retired = cushDrives.filter(c => !isActive(c)).sort((a, b) => (a.km_at_install || 0) - (b.km_at_install || 0));
    let html = '<div class="consumable-card">';

    if (active) {
      const kmRidden = currentOdo != null && active.km_at_install != null
        ? Math.max(0, currentOdo - active.km_at_install) : null;
      html += `<div class="consumable-card-title">🔩 Cush Drive
        <span class="consumable-badge badge-active">Active</span>
      </div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem">Installed ${fmtDate(active.installed_at)}</div>
      ${kmBlock(active.km_at_install, active.km_limit, kmRidden)}
      ${active.notes ? `<div style="font-size:0.8rem;color:var(--muted);font-style:italic;margin-top:0.25rem">${active.notes}</div>` : ''}`;
    } else {
      html += `<div class="consumable-card-title">🔩 Cush Drive</div>`;
    }

    if (retired.length) {
      html += `<button class="collapsible-toggle" id="cush-hist-btn"
        onclick="toggleCollapsible('cush-hist','cush-hist-btn')">▼ ${retired.length} retired</button>
      <div class="collapsible-content" id="cush-hist" style="margin-top:0.5rem">
        ${historyRows(retired, () => '')}
      </div>`;
    }
    return html + '</div>';
  }

  function renderBrakePadCard(pads, position) {
    if (!pads.length) return '';
    const active  = pads.find(isActive);
    const retired = pads.filter(p => !isActive(p)).sort((a, b) => (a.km_at_install || 0) - (b.km_at_install || 0));
    const label   = position === 'front' ? '🛑 Front Brake Pads' : '🛑 Rear Brake Pads';
    const idPfx   = 'pad-' + position;
    let html = '<div class="consumable-card">';

    if (active) {
      const kmRidden = currentOdo != null && active.km_at_install != null
        ? Math.max(0, currentOdo - active.km_at_install) : null;
      html += `<div class="consumable-card-title">${label}
        <span class="consumable-badge badge-active">Active</span>
      </div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem">${active.brand ? active.brand + ' · ' : ''}Installed ${fmtDate(active.installed_at)}</div>
      ${kmBlock(active.km_at_install, active.km_limit, kmRidden)}
      ${active.notes ? `<div style="font-size:0.8rem;color:var(--muted);font-style:italic;margin-top:0.25rem">${active.notes}</div>` : ''}`;
    } else {
      html += `<div class="consumable-card-title">${label}</div>`;
    }

    if (retired.length) {
      html += `<button class="collapsible-toggle" id="${idPfx}-hist-btn"
        onclick="toggleCollapsible('${idPfx}-hist','${idPfx}-hist-btn')">▼ ${retired.length} retired</button>
      <div class="collapsible-content" id="${idPfx}-hist" style="margin-top:0.5rem">
        ${historyRows(retired, p => `<span style="font-weight:600;color:var(--text)">${p.brand || '—'}</span>`)}
      </div>`;
    }
    return html + '</div>';
  }

  const hasDrivetrain = chains.length || cushDrives.length || sprFront.length || sprRear.length;
  const hasBrakes     = padsFront.length || padsRear.length;

  let out = '<div class="consumables-section">';

  if (hasDrivetrain) {
    out += `<div class="consumables-group">
      <div class="consumables-group-title">Drive Train</div>
      ${renderChainCard()}
      ${renderSprocketCard(sprFront, 'front')}
      ${renderSprocketCard(sprRear,  'rear')}
      ${renderCushDriveCard()}
    </div>`;
  }

  if (hasBrakes) {
    out += `<div class="consumables-group">
      <div class="consumables-group-title">Brakes</div>
      ${renderBrakePadCard(padsFront, 'front')}
      ${renderBrakePadCard(padsRear,  'rear')}
    </div>`;
  }

  return out + '</div>';
}
</script>
</body>
</html>
